<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pendulum Measurement</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; display: flex; flex-direction: column; height: 100vh; }
  h1 { text-align: center; }
  .controls { margin-bottom: 20px; text-align: center; }
  label { display: block; margin-top: 10px; }
  .measurements { text-align: center; margin-bottom: 20px; }
  .measurements label { display: inline-block; margin-right: 20px; margin-top: 0; }
  input { margin-left: 10px; }
  button { margin: 5px; padding: 8px 12px; }
  #chart { width: 100%; flex: 1; }
</style>
</head>
<body>
<h1>Pendulum Measurement</h1>

<div class="controls">
  <button id="connectBtn">Connect Micro:bit</button>
  <button id="startBtn">Start Measurement</button>
  <button id="exportBtn">Export to Excel</button>
</div>

<div class="measurements">
  <label>Mass (g): <input type="number" id="massInput"></label>
  <label>Length (cm): <input type="number" id="lengthInput" onchange="updatePeriod()"></label>
  <label>Measurement Time (s): <input type="number" id="timeInput"></label>
  <label>Angle (deg): <span id="angleDisplay">0</span></label>
  <label>Period (s): <span id="periodDisplay">0.00</span></label>
</div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>

<script>
let device, server, accelService, accelChar;
let chart, chartData = [];
let measurements = [];
let measuring = false;
let armed = false;
let startTime = null;
let measurementDuration = 0;
let initialAngle = 0;

const ACCEL_SERVICE_UUID = 'e95d0753-251d-470a-a062-fa1922dfa9a8';
const ACCEL_CHAR_UUID    = 'e95dca4b-251d-470a-a062-fa1922dfa9a8';

function updatePeriod() {
  const lengthCm = parseFloat(document.getElementById('lengthInput').value) || 0;
  if (lengthCm > 0) {
    const lengthM = lengthCm / 100;
    const g = 9.81;
    const period = 2 * Math.PI * Math.sqrt(lengthM / g);
    document.getElementById('periodDisplay').textContent = period.toFixed(2);
  } else {
    document.getElementById('periodDisplay').textContent = '0.00';
  }
}

function initChart() {
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Amplitude (cm)',
        data: [],
        borderColor: 'blue',
        fill: false
      }]
    },
    options: {
      animation: false,
      scales: {
        x: { title: { display: true, text: 'Time (s)' } },
        y: {
          title: { display: true, text: 'Amplitude (cm)' },
          min: -1000,
          max: 1000,
          beginAtZero: false,
          ticks: {
            stepSize: 500,
            callback: (value) => Number(value).toFixed(0)
          },
          grid: { color: '#e9e9e9' }
        }
      },
      plugins: {
        tooltip: {
          callbacks: {
            label: (context) => `Amplitude: ${Number(context.parsed.y).toFixed(0)} cm`
          }
        }
      }
    }
  });
}
initChart();

document.getElementById('connectBtn').onclick = async () => {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'BBC micro:bit' }],
      optionalServices: [ACCEL_SERVICE_UUID]
    });
    server = await device.gatt.connect();
    accelService = await server.getPrimaryService(ACCEL_SERVICE_UUID);
    accelChar = await accelService.getCharacteristic(ACCEL_CHAR_UUID);
    await accelChar.startNotifications();
    accelChar.addEventListener('characteristicvaluechanged', handleAccel);
    alert('Connected to micro:bit!');
  } catch (err) {
    console.error(err);
    alert('Connection failed: ' + err);
  }
};

function handleAccel(event) {
  const dv = event.target.value;
  const x = dv.getInt16(0, true);
  const y = dv.getInt16(2, true);
  const z = dv.getInt16(4, true);

  // ✅ ISPRAVKA: saturacija pre asin da se uklone duple oscilacije
  const normalized = Math.max(-1, Math.min(1, (y - 1088) / 1024));
  const rawAngle = Math.asin(normalized) * 180 / Math.PI;

  const angle = Math.round(Math.abs(rawAngle));
  document.getElementById('angleDisplay').textContent = angle;

  const lengthInput = parseFloat(document.getElementById('lengthInput').value) || 0;
  let amplitude = 0;
  if (lengthInput > 0) {
    amplitude = lengthInput * Math.sin(rawAngle * Math.PI / 180);
  } else {
    amplitude = (y - 1088) / 10;
  }

  const now = Date.now();

  if (armed && !measuring) {
    if (Math.abs(y - 1088) < 100) {
      measuring = true;
      startTime = now;
      chartData = [];
      chart.data.labels = [];
      chart.data.datasets[0].data = [];
      chart.update();
      console.log("Pendulum top detected, measurement started");
    }
  }

  if (measuring) {
    const elapsed = (now - startTime) / 1000;
    chart.data.labels.push(elapsed.toFixed(2));
    chart.data.datasets[0].data.push(amplitude);
    chart.update();

    chartData.push({ time: elapsed, amplitude });

    if (elapsed >= measurementDuration) {
      measuring = false;
      armed = false;
      const mass = document.getElementById('massInput').value;
      const length = document.getElementById('lengthInput').value;
      measurements.push({ data: chartData, mass, length, angle: initialAngle });
      chartData = [];
      alert('Measurement finished!');
    }
  }
}

document.getElementById('startBtn').onclick = () => {
  const mass = parseFloat(document.getElementById('massInput').value);
  const length = parseFloat(document.getElementById('lengthInput').value);
  measurementDuration = parseFloat(document.getElementById('timeInput').value);

  if (!mass || !length || !measurementDuration) {
    alert('Please enter mass, length, and time.');
    return;
  }

  armed = true;
  measuring = false;
  initialAngle = 0;

  if (length > 0) {
    const verticalRange = length * 1.1;
    chart.options.scales.y.min = -verticalRange;
    chart.options.scales.y.max = verticalRange;
    chart.options.scales.y.ticks = {
      stepSize: Math.max(1, Math.round(length / 10)),
      callback: (value) => Number(value).toFixed(0)
    };
    chart.update();
  }

  alert('Armed: waiting for pendulum to reach the bottom');
};

document.getElementById('exportBtn').onclick = async () => {
  if (measurements.length === 0) {
    alert('No measurements to export.');
    return;
  }
  const workbook = new ExcelJS.Workbook();
  measurements.forEach((run, idx) => {
    const sheetName = `Measurement ${idx+1} (M${run.mass}g L${run.length}cm A${run.angle}cm)`;
    const sheet = workbook.addWorksheet(sheetName);
    sheet.columns = [
      { header: 'Time (s)', key: 'time', width: 15 },
      { header: 'Amplitude (cm)', key: 'amplitude', width: 20 }
    ];
    run.data.forEach(row => sheet.addRow(row));
  });
  const buf = await workbook.xlsx.writeBuffer();
  saveAs(new Blob([buf]), 'pendulum_measurements.xlsx');
  measurements = [];
  alert('Exported and cleared measurements.');
};
</script>
</body>
</html>
